<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PrintShop — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="card auth-card">
    <h1>Print & Design Shop — Login</h1>
    <form id="loginForm" class="form">
      <label for="staffId">Staff ID</label>
      <input id="staffId" name="staffId" required inputmode="numeric" />

      <label for="pin">PIN</label>
      <input id="pin" name="pin" type="password" required inputmode="numeric" />

      <div class="row">
        <button type="submit" class="btn primary large">Sign In</button>
      </div>
    </form>
    <p class="muted">Default admin: ID 1000 PIN 1234 (created on first run)</p>
  </main>

  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
</body>
</html>
