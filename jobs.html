<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jobs — PrintShop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h2 class="brand">PrintShop</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html" class="active">Jobs</a>
        <a href="inventory.html">Inventory</a>
        <a href="customers.html">Customers</a>
        <a href="billing.html">Billing</a>
        <a href="staff.html">Staff</a>
        <a href="reports.html">Reports</a>
      </nav>
      <button id="logoutBtn" class="btn outline">Logout</button>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1>Job Management</h1>
        <div class="actions">
          <button id="newJobBtn" class="btn primary">New Job</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <input id="jobSearch" placeholder="Search jobs..." />
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
            <option>Delivered</option>
          </select>
        </div>

        <table class="table" id="jobsTable">
          <thead>
            <tr><th>ID</th><th>Customer</th><th>Type</th><th>Qty</th><th>Status</th><th>Staff</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <div id="jobModal" class="modal" hidden>
        <div class="modal-content">
          <h3 id="jobModalTitle">New Job</h3>
          <form id="jobForm" class="form">
            <label>Customer (name or ID)</label>
            <input id="jobCustomer" required />

            <label>Job Type</label>
            <select id="jobType">
              <option>Digital</option>
              <option>Offset</option>
              <option>Large Format</option>
            </select>

            <label>Pages / Quantity</label>
            <input id="jobQty" type="number" min="1" value="1" required />

            <label>Size</label>
            <input id="jobSize" placeholder="A4, A3, Custom" />

            <label>Color</label>
            <select id="jobColor"><option>Color</option><option>Black & White</option></select>

            <label>Special Instructions</label>
            <textarea id="jobNotes"></textarea>

            <label>Assign Staff</label>
            <select id="jobStaff"></select>

            <div class="row">
              <button type="submit" class="btn primary">Save Job</button>
              <button type="button" id="cancelJob" class="btn outline">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/jobs.js" defer></script>
</body>
</html>
