<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customers — PrintShop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h2 class="brand">PrintShop</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="inventory.html">Inventory</a>
        <a href="customers.html" class="active">Customers</a>
        <a href="billing.html">Billing</a>
        <a href="staff.html">Staff</a>
        <a href="reports.html">Reports</a>
      </nav>
      <button id="logoutBtn" class="btn outline">Logout</button>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1>Customers</h1>
        <div class="actions">
          <button id="newCustomerBtn" class="btn primary">New Customer</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <input id="customerSearch" placeholder="Search customers..." />
        </div>

        <table class="table" id="customersTable">
          <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Jobs</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <div id="customerModal" class="modal" hidden>
        <div class="modal-content">
          <h3 id="customerModalTitle">New Customer</h3>
          <form id="customerForm" class="form">
            <label>Name</label>
            <input id="custName" required />

            <label>Phone</label>
            <input id="custPhone" />

            <label>Email</label>
            <input id="custEmail" type="email" />

            <div class="row">
              <button type="submit" class="btn primary">Save</button>
              <button type="button" id="cancelCustomer" class="btn outline">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div id="customerJobsModal" class="modal" hidden>
        <div class="modal-content">
          <h3>Customer Job History</h3>
          <div id="customerJobsList"></div>
          <div class="row"><button id="closeCustJobs" class="btn">Close</button></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/customers.js" defer></script>
</body>
</html>
