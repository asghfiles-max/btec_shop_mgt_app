<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Printing Shop Management</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand">
      <h1>Print Shop Management</h1>
      <p>Secure access to orders, inventory, invoices and reports.</p>
    </div>
    <form id="loginForm" class="auth-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="admin@example.com" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter your password" required />
      <button type="submit" class="btn primary">Sign In</button>
    </form>
    <p class="muted">Use the seeded administrator user or your assigned credentials.</p>
  </main>
  <script src="../js/config.js" defer></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/utils.js" defer></script>
  <script src="../js/auth.js" defer></script>
</body>
</html>
