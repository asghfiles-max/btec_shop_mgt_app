<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventory — PrintShop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h2 class="brand">PrintShop</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="inventory.html" class="active">Inventory</a>
        <a href="customers.html">Customers</a>
        <a href="billing.html">Billing</a>
        <a href="staff.html">Staff</a>
        <a href="reports.html">Reports</a>
      </nav>
      <button id="logoutBtn" class="btn outline">Logout</button>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1>Inventory</h1>
        <div class="actions">
          <button id="newItemBtn" class="btn primary">Add Item</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <input id="inventorySearch" placeholder="Search inventory..." />
          <select id="inventoryFilter"><option value="">All</option><option>Paper</option><option>Ink</option><option>Toner</option><option>Consumable</option></select>
        </div>

        <table class="table" id="inventoryTable">
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Min</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <div id="itemModal" class="modal" hidden>
        <div class="modal-content">
          <h3 id="itemModalTitle">Add Item</h3>
          <form id="itemForm" class="form">
            <label>Name</label>
            <input id="itemName" required />

            <label>Category</label>
            <select id="itemCategory"><option>Paper</option><option>Ink</option><option>Toner</option><option>Consumable</option></select>

            <label>Quantity</label>
            <input id="itemQty" type="number" min="0" value="0" />

            <label>Min Alert Quantity</label>
            <input id="itemMin" type="number" min="0" value="5" />

            <div class="row">
              <button type="submit" class="btn primary">Save</button>
              <button type="button" id="cancelItem" class="btn outline">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/inventory.js" defer></script>
</body>
</html>
