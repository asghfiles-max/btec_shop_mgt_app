<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff — PrintShop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h2 class="brand">PrintShop</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="inventory.html">Inventory</a>
        <a href="customers.html">Customers</a>
        <a href="billing.html">Billing</a>
        <a href="staff.html" class="active">Staff</a>
        <a href="reports.html">Reports</a>
      </nav>
      <button id="logoutBtn" class="btn outline">Logout</button>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1>Staff Management</h1>
        <div class="actions">
          <button id="newStaffBtn" class="btn primary">Add Staff</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <input id="staffSearch" placeholder="Search staff..." />
        </div>

        <table class="table" id="staffTable">
          <thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Status</th><th>Completed Jobs</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <div id="staffModal" class="modal" hidden>
        <div class="modal-content">
          <h3 id="staffModalTitle">Add Staff</h3>
          <form id="staffForm" class="form">
            <label>Name</label>
            <input id="staffName" required />

            <label>Role</label>
            <select id="staffRole"><option>Admin</option><option>Staff</option></select>

            <label>PIN</label>
            <input id="staffPin" required inputmode="numeric" />

            <div class="row">
              <button type="submit" class="btn primary">Save</button>
              <button type="button" id="cancelStaff" class="btn outline">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/staff.js" defer></script>
</body>
</html>
